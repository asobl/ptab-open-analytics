<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0d1520;
    font-family: Georgia, 'Times New Roman', serif;
    color: #f0ece4;
    overflow: hidden;
    position: relative;
  }

  /* Left accent bar */
  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: #c8401a;
  }

  /* Grid paper texture overlay */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,64,26,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,64,26,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .inner {
    position: relative;
    padding: 52px 72px 52px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Top row */
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #c8401a;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }

  .badge {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border: 1px solid #2a3040;
    padding: 6px 14px;
    border-radius: 2px;
  }

  /* Headline */
  .headline-block {
    flex: 1;
    display: flex;
    align-items: center;
  }

  .headline {
    font-size: 68px;
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.01em;
    max-width: 820px;
  }

  .headline em {
    font-style: italic;
    color: #c8401a;
  }

  /* Stats row */
  .stats {
    display: flex;
    gap: 0;
    border-top: 1px solid #2a3040;
    padding-top: 28px;
  }

  .stat {
    flex: 1;
    padding-right: 32px;
  }

  .stat + .stat {
    padding-left: 32px;
    border-left: 1px solid #2a3040;
  }

  .stat-num {
    font-family: 'Courier New', monospace;
    font-size: 38px;
    font-weight: 700;
    color: #f0ece4;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .stat-label {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-top: 6px;
  }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #2a3040;
    padding-top: 20px;
  }

  .url {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #4b5563;
    letter-spacing: 0.04em;
  }

  .built-by {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #374151;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="grid"></div>
  <div class="inner">

    <div class="top-row">
      <div class="eyebrow">PTAB Open Analytics — Vol. 1</div>
      <div class="badge">Open Source · No Login · Free</div>
    </div>

    <div class="headline-block">
      <h1 class="headline">Free IPR Intelligence.<br><em>What Lex Machina<br>charges $30k/year for.</em></h1>
    </div>

    <div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num">19,140</div>
          <div class="stat-label">Proceedings since 2012</div>
        </div>
        <div class="stat">
          <div class="stat-num">60%</div>
          <div class="stat-label">Institution rate</div>
        </div>
        <div class="stat">
          <div class="stat-num">190</div>
          <div class="stat-label">Median days to decision</div>
        </div>
        <div class="stat">
          <div class="stat-num">146</div>
          <div class="stat-label">APJ judges tracked</div>
        </div>
      </div>

      <div class="bottom-bar">
        <div class="url">asobl.github.io/ptab-open-analytics</div>
        <div class="built-by">USPTO Data · April 2026</div>
      </div>
    </div>

  </div>
</body>
</html>
